<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@900&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f8fafc;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .logo {
      position: absolute;
      top: 2.5rem;
      left: 2.5rem;
      font-size: 32px;
      font-weight: 900;
      color: #7B3CE3;
      letter-spacing: 3px;
      z-index: 10;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .error-img {
      height: 60vh;
      width: auto;
      max-width: 100%;
    }

    .error-title {
      font-size: 50px;
      font-weight: 800;
      color: #7B3CE3;
      margin-top: 2rem;
      text-transform: uppercase;
      letter-spacing: -1px;
    }

    .home-link {
      margin-top: 2rem;
      font-size: 20px;
      font-weight: 700;
      color: #7B3CE3;
      text-decoration: none;
      font-family: system-ui, -apple-system, sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 2px solid #7B3CE3;
      border-radius: 50px;
      padding: 0.4rem 1.2rem;
    }

    .home-link:hover {
      color: #5c27b0;
      border-color: #5c27b0;
    }

    .redirect-text {
      margin-top: 2rem;
      font-size: 20px;
      font-weight: 600;
      color: #7B3CE3;
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      max-width: 80%;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="logo">EAP</div>

  <div class="container">
    <img src="{{.Image}}" alt="Error" class="error-img">
    {{if .ShowText}}
    <div class="error-title">{{.ErrorText}}</div>
    {{end}}
    
    {{if eq .StatusCode 429}}
      <div class="redirect-text">Please wait a few seconds, you will be redirected back...</div>
      <script>
        const redirectTo = new URLSearchParams(window.location.search).get('redirect_to') || '/';
        setTimeout(() => {
          window.location.href = redirectTo;
        }, 5000);
      </script>
    {{else}}
      <a href="/" class="home-link">Go to Home</a>
    {{end}}
  </div>
</body>

</html>
